<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    display: flex;
    height: 100vh;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    height: 100%;
    max-height: 700px;
    background: #12122a;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid #2a2a4a;
  }

  /* ── SCROLL AREA ── */
  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 12px 10px;
  }

  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

  /* ── SECTION: OVERVIEW (ACTIVE) ── */
  .nav-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 10px;
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
  }

  .nav-section-header.active {
    background: #7c6fcd;
  }

  .nav-section-header:not(.active):hover {
    background: #1e1e3a;
  }

  .nav-section-left {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .nav-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    opacity: 0.85;
  }

  .nav-label {
    font-size: 13.5px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.01em;
  }

  .nav-section-header:not(.active) .nav-label {
    color: #b0aed0;
  }

  .chevron {
    width: 14px;
    height: 14px;
    color: #ffffff99;
    flex-shrink: 0;
  }

  /* ── SUB ITEMS ── */
  .sub-items {
    padding-left: 10px;
    margin-top: 2px;
  }

  .sub-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px 8px 22px;
    border-radius: 8px;
    cursor: pointer;
    color: #9896b8;
    font-size: 13px;
    font-weight: 500;
    position: relative;
    user-select: none;
  }

  .sub-item:hover {
    background: #1e1e3a;
    color: #d0cef0;
  }

  .sub-item::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #3a3860;
  }

  .sub-item .badge {
    background: #2e2d52;
    color: #c0bede;
    font-size: 10.5px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 20px;
  }

  .sub-item .chevron-sm {
    width: 12px;
    height: 12px;
    color: #5a5880;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: #1e1e3a;
    margin: 8px 10px;
  }

  /* ── STARRED FILES HEADER ── */
  .section-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #7a789a;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .section-label svg {
    width: 14px;
    height: 14px;
    color: #5a5880;
    cursor: pointer;
  }

  .section-label svg:hover { color: #9896b8; }

  /* ── FOLDER TREE ── */
  .folder-group {
    margin-bottom: 2px;
  }

  .folder-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: #c0bede;
    font-size: 13px;
    font-weight: 500;
    user-select: none;
  }

  .folder-row:hover { background: #1e1e3a; }

  .folder-row svg { width: 15px; height: 15px; flex-shrink: 0; }
  .folder-row .folder-icon { color: #7c6fcd; }
  .folder-row .arrow { color: #5a5880; margin-left: auto; width: 13px; height: 13px; }

  /* nested folders */
  .nested {
    padding-left: 18px;
  }

  .nested .folder-row {
    font-size: 12.5px;
    color: #9896b8;
    padding: 6px 10px;
  }

  .nested .folder-row:hover { color: #d0cef0; }

  /* leaf items */
  .nested-leaf {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 10px 6px 28px;
    border-radius: 8px;
    cursor: pointer;
    color: #7a789a;
    font-size: 12px;
    user-select: none;
  }

  .nested-leaf:hover {
    background: #1e1e3a;
    color: #b0aed0;
  }

  .nested-leaf::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #3a3860;
    flex-shrink: 0;
  }

  /* ── NEW FOLDER BUTTON ── */
  .new-folder-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 10px;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1.5px dashed #2e2d52;
    background: transparent;
    color: #7a789a;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    width: calc(100% - 20px);
    transition: border-color 0.15s, color 0.15s;
  }

  .new-folder-btn:hover {
    border-color: #7c6fcd;
    color: #b0aed0;
  }

  .new-folder-btn svg { width: 14px; height: 14px; }

  /* ── UPGRADE BANNER ── */
  .upgrade-banner {
    margin: 4px 10px 10px;
    background: #1e1e3a;
    border-radius: 14px;
    padding: 16px 14px 14px;
    position: relative;
    overflow: hidden;
    border: 1px solid #2a2a4a;
  }

  /* rocket illustration */
  .rocket-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }

  .rocket-circle {
    width: 62px;
    height: 62px;
    background: #f5a623;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    box-shadow: 0 4px 18px #f5a62344;
  }

  .banner-title {
    font-size: 13.5px;
    font-weight: 700;
    color: #e8e6ff;
    text-align: center;
    margin-bottom: 5px;
  }

  .banner-desc {
    font-size: 11.5px;
    color: #7a789a;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 13px;
  }

  .upgrade-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 9px 0;
    background: #7c6fcd;
    color: #ffffff;
    font-size: 12.5px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s;
  }

  .upgrade-btn:hover { background: #6a5fc0; }
  .upgrade-btn svg { width: 13px; height: 13px; }

  /* dots menu on banner */
  .banner-menu {
    position: absolute;
    top: 10px;
    right: 10px;
    color: #3a3860;
    cursor: pointer;
    font-size: 18px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-scroll">

    <!-- OVERVIEW (active) -->
    <div class="nav-section-header active">
      <div class="nav-section-left">
        <!-- grid icon -->
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Overview</span>
      </div>
      <svg class="chevron" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M18 15l-6-6-6 6"/>
      </svg>
    </div>

    <!-- Sub items of Overview -->
    <div class="sub-items">
      <div class="sub-item">
        My Overview
        <svg class="chevron-sm" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
      <div class="sub-item">
        Recent Activity
        <span class="badge">242</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- STARRED FILES -->
    <div class="section-label">
      Starred Files
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </div>

    <!-- UI & UX Design (expanded) -->
    <div class="folder-group">
      <div class="folder-row">
        <svg class="folder-icon" fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
        </svg>
        <span style="flex:1">UI &amp; UX Design</span>
        <svg class="arrow" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M18 15l-6-6-6 6"/>
        </svg>
      </div>

      <!-- nested: Products Designs -->
      <div class="nested">
        <div class="folder-row">
          <svg class="folder-icon" fill="currentColor" viewBox="0 0 24 24">
            <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
          </svg>
          <span style="flex:1">Products Designs</span>
          <svg class="arrow" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M18 15l-6-6-6 6"/>
          </svg>
        </div>

        <div class="nested-leaf">Course Dashboard</div>
        <div class="nested-leaf">KDS Dashboard</div>

        <!-- Drapora Projects -->
        <div class="folder-row" style="padding-left:10px">
          <svg class="folder-icon" fill="currentColor" viewBox="0 0 24 24">
            <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
          </svg>
          <span style="flex:1">Drapora Projects</span>
        </div>
      </div>
    </div>

    <!-- Design Systems -->
    <div class="folder-row">
      <svg class="folder-icon" fill="currentColor" viewBox="0 0 24 24">
        <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
      </svg>
      <span style="flex:1">Design Systems</span>
      <svg class="arrow" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </div>

    <!-- Web Apps -->
    <div class="folder-row">
      <svg class="folder-icon" fill="currentColor" viewBox="0 0 24 24">
        <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
      </svg>
      <span style="flex:1">Web Apps</span>
      <svg class="arrow" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </div>

    <!-- New Folder -->
    <button class="new-folder-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      New Folder
    </button>

  </div><!-- /sidebar-scroll -->

  <!-- UPGRADE BANNER -->
  <div class="upgrade-banner">
    <span class="banner-menu">···</span>
    <div class="rocket-wrap">
      <div class="rocket-circle">🚀</div>
    </div>
    <div class="banner-title">Trial Ending Soon!</div>
    <div class="banner-desc">Your access expires in 6 days.<br>Upgrade now for access!</div>
    <button class="upgrade-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Upgrade to Pro
    </button>
  </div>

</div><!-- /sidebar -->

</body>
</html>
